<script>
  function plot_all() {
    GetPlot().then(
      function (plots) {
        let canvas = document.getElementById('plots');
        for (let plot of plots) {
          let div = document.createElement('div');
          Plotly.plot(
            div,
            [ { x: plot.x, y: plot.y } ],
            {
              title: plot.title,
              xaxis: { title: plot.xlabel },
              yaxis: { title: plot.ylabel }
            }
          );
          canvas.appendChild(div);
        }
      }
    );
  }
</script>

<script src="https://cdn.plot.ly/plotly-1.8.0.min.js" async onload='plot_all()'></script>
